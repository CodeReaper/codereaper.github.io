global:
  logging:
    level: debug

configs:
  params:
    server.insecure: true

  cm:
    url: http://argo.127.0.0.1.nip.io
    admin.enabled: false
    oidc.config: |
      name: Dex
      issuer: http://dex.127.0.0.1.nip.io
      clientID: argocd
      clientSecret: $client-secret:CLIENT_SECRET
      requestedScopes:
        - openid
        - profile
        - email
        - groups

  rbac:
    policy.default: role:none
    policy.csv: |
      g, editor, role:admin
      g, viewer, role:readonly

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argo.127.0.0.1.nip.io

dex:
  enabled: false

redisSecretInit:
  enabled: false